databases:
  - name: cyberarcade-db
    plan: free
    databaseName: cyberarcade

services:
  - type: web
    name: cyberarcade-crm
    runtime: node
    plan: free
    buildCommand: ./render-build.sh
    startCommand: node artifacts/api-server/dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        fromDatabase:
          name: cyberarcade-db
          property: connectionString
